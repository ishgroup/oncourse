name: Build and Push Server to ECR

on:
  workflow_dispatch:
    inputs:
      app_version:
        type: string
        required: true
        description: App version (e.g., 123.54.2)
        default: ''
      plugins_version:
        type: string
        required: true
        description: Plugins version (e.g., 1.100.1)
        default: ''

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: angel

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifact
        run: |
          VERSION="${{ inputs.app_version }}"
          ASSET_NAME="onCourseServer-${VERSION}.tgz"
          TAG_NAME="v${VERSION}"

          echo "TAG_NAME=$TAG_NAME"
          echo "ASSET_NAME=$ASSET_NAME"
          echo "Download URL: https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/$ASSET_NAME"

          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/$ASSET_NAME" \
            --output "$ASSET_NAME"
          
          mkdir -p artifacts
          mv $ASSET_NAME artifacts/
          echo "✓ Downloaded successfully: $ASSET_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract artifact
        run: |
          file=$(find artifacts/ -type f -name "*.tgz" | head -n1)
          name=$(basename "$file")
          echo "APP_ARTIFACT=$name" >> $GITHUB_ENV
          
          mkdir -p artifacts/unpack
          tar xvf artifacts/$name --strip-components=1 -C artifacts/unpack
          echo "✓ Extracted: $name"

      - name: Download plugins
        run: |
          PLUGINS_VERSION="${{ inputs.plugins_version }}"
          PLUGINS_TAG="v${PLUGINS_VERSION}"
          PLUGINS_REPO="ishgroup/oncourse-secret"
          
          mkdir -p artifacts/unpack/plugins
          
          PLUGINS=(
            "cloud-assess"
            "myob"
            "replication"
            "service-nsw"
            "tcsi"
            "xero"
          )
          
          echo "Downloading plugins version: $PLUGINS_VERSION"
          
          RELEASE_INFO=$(curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ONCOURSE_SECRET_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PLUGINS_REPO}/releases/tags/${PLUGINS_TAG}")
          
          for plugin in "${PLUGINS[@]}"; do
            PLUGIN_FILE="${plugin}-${PLUGINS_VERSION}.jar"
            
            echo "Downloading: $PLUGIN_FILE"
            
            ASSET_ID=$(echo "$RELEASE_INFO" | jq -r ".assets[] | select(.name==\"${PLUGIN_FILE}\") | .id")
            
            if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
              echo "✗ Asset not found: $PLUGIN_FILE"
              echo "Available assets:"
              echo "$RELEASE_INFO" | jq -r '.assets[].name'
              exit 1
            fi
            
            echo "Found asset ID: $ASSET_ID"
            
            curl -L \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.ONCOURSE_SECRET_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${PLUGINS_REPO}/releases/assets/${ASSET_ID}" \
              --output "artifacts/unpack/plugins/$PLUGIN_FILE"
            
            FILE_SIZE=$(stat -c%s "artifacts/unpack/plugins/$PLUGIN_FILE" 2>/dev/null || stat -f%z "artifacts/unpack/plugins/$PLUGIN_FILE" 2>/dev/null)
            
            if [ "$FILE_SIZE" -lt 100 ]; then
              echo "✗ Failed: $PLUGIN_FILE is too small ($FILE_SIZE bytes)"
              cat "artifacts/unpack/plugins/$PLUGIN_FILE"
              exit 1
            fi
            
            echo "✓ Downloaded: $PLUGIN_FILE ($FILE_SIZE bytes)"
          done
          
          echo "✓ All plugins downloaded successfully"
          ls -lh artifacts/unpack/plugins/
        env:
          GITHUB_TOKEN: ${{ secrets.ONCOURSE_SECRET_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.app_version }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "✓ Image pushed successfully!"
          echo "ECR Repository: ${{ env.ECR_REPOSITORY }}"
          echo "Version: ${{ inputs.app_version }}"
          echo "Registry: ${{ steps.login-ecr.outputs.registry }}/willow/${{ env.ECR_REPOSITORY }}"
          echo "App Version: ${{ inputs.app_version }}"
          echo "Plugins Version: ${{ inputs.plugins_version }}"
          echo "Registry: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
